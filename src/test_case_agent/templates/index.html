<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Case Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .sidebar { background-color: #161b22; transition: all 0.3s ease; }
        .sidebar.collapsed { width: 70px !important; }
        .sidebar.collapsed .text-label { display: none; }
        .tab-btn { transition: all 0.2s ease; }
        .tab-btn.active {
            background-color: #21262d;
            border-left: 4px solid #238636;
            color: #fff;
        }
        .tab-btn:hover:not(.active) { background-color: #21262d; }
        
        .result-container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            white-space: pre-wrap;
            max-height: 520px;
            overflow-y: auto;
            line-height: 1.5;
        }

        /* Modal centrado */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #161b22;
            border-radius: 12px;
            width: 480px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body class="min-h-screen flex">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar w-64 h-screen p-4 flex flex-col border-r border-[#30363d]">
        <div class="flex items-center justify-between mb-8 px-2">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🧪</span>
                <h1 id="sidebar-title" class="text-2xl font-bold text-label">Test Case Agent</h1>
            </div>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white">
                <i id="toggle-icon" class="fas fa-chevron-left text-xl"></i>
            </button>
        </div>

        <button onclick="showTab('manual')" id="btn-manual"
                class="tab-btn active flex items-center gap-3 w-full text-left px-4 py-3 rounded-lg mb-2">
            <i class="fas fa-edit w-5"></i>
            <span class="text-label">Descripción Manual</span>
        </button>

        <button onclick="showTab('jira')" id="btn-jira"
                class="tab-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-lg mb-2">
            <i class="fas fa-link w-5"></i>
            <span class="text-label">Jira</span>
        </button>

        <button onclick="showTab('config')" id="btn-config"
                class="tab-btn flex items-center gap-3 w-full text-left px-4 py-3 rounded-lg mb-2">
            <i class="fas fa-cog w-5"></i>
            <span class="text-label">Configuración</span>
        </button>

        <div class="mt-auto text-xs text-gray-500 px-2 pt-6">
            Versión Flask • Todo local
        </div>
    </div>

    <!-- Contenido principal -->
    <div class="flex-1 p-8 overflow-auto">

        <!-- TAB 1: Manual -->
        <div id="tab-manual">
            <h2 class="text-3xl font-semibold mb-6">Descripción Manual</h2>
            <textarea id="manual-desc" rows="8" class="w-full bg-[#161b22] border border-[#30363d] rounded-lg p-4 text-white" placeholder="Describe la funcionalidad..."></textarea>
            <textarea id="manual-ctx" rows="3" class="w-full bg-[#161b22] border border-[#30363d] rounded-lg p-4 mt-4 text-white" placeholder="Contexto adicional (opcional)"></textarea>
            
            <button id="manual-btn" onclick="generateManual()" 
                    class="mt-6 bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg font-medium flex items-center gap-2">
                <span id="manual-text">Generar casos de prueba</span>
                <span id="manual-spinner" class="hidden"><i class="fas fa-spinner fa-spin"></i></span>
            </button>

            <!-- Resultado exclusivo de Manual -->
            <div id="result-manual" class="mt-10 hidden">
                <h2 class="text-2xl font-bold mb-4">Resultado generado (Manual)</h2>
                <div id="result-content-manual" contenteditable="true" class="result-container"></div>
                <div class="mt-6 flex gap-4">
                    <button onclick="downloadJsonManual()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-medium">📥 Descargar como JSON</button>
                    <button onclick="downloadTxtManual()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-medium">📥 Descargar como TXT</button>
                </div>
            </div>
        </div>

        <!-- TAB 2: Jira -->
        <div id="tab-jira" class="hidden">
            <h2 class="text-3xl font-semibold mb-6">Ticket de Jira</h2>
            <select id="jira-profile" class="w-full bg-[#161b22] border border-[#30363d] rounded-lg p-3 text-white mb-4"></select>
            <input id="jira-ticket" type="text" placeholder="BAL-456" class="w-full bg-[#161b22] border border-[#30363d] rounded-lg p-4 text-white">
            <textarea id="jira-ctx" rows="3" class="w-full bg-[#161b22] border border-[#30363d] rounded-lg p-4 mt-4 text-white" placeholder="Contexto adicional (opcional)"></textarea>
            
            <button id="jira-btn" onclick="generateJira()" 
                    class="mt-6 bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg font-medium flex items-center gap-2">
                <span id="jira-text">Cargar ticket y generar</span>
                <span id="jira-spinner" class="hidden"><i class="fas fa-spinner fa-spin"></i></span>
            </button>

            <!-- Resultado exclusivo de Jira -->
            <div id="result-jira" class="mt-10 hidden">
                <h2 class="text-2xl font-bold mb-4">Resultado generado (Jira)</h2>
                <div id="result-content-jira" contenteditable="true" class="result-container"></div>
                <div class="mt-6 flex gap-4">
                    <button onclick="downloadJsonJira()" class="bg-gray-700 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-medium">📥 Descargar como JSON</button>
                    <button onclick="downloadTxtJira()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-lg font-medium">📥 Descargar como TXT</button>
                </div>
            </div>
        </div>

        <!-- TAB 3: Configuración -->
        <div id="tab-config" class="hidden">
            <h2 class="text-3xl font-semibold mb-6">Configuración</h2>
            <div class="bg-[#161b22] border border-[#30363d] rounded-lg p-6">
                <h3 class="font-semibold mb-4">Modelo Ollama</h3>
                <select id="config-model" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-white">
                    <option value="qwen2:7b">qwen2:7b (recomendado)</option>
                    <option value="llama3.1:8b">llama3.1:8b</option>
                </select>

                <h3 class="font-semibold mt-8 mb-4">Perfiles de Jira</h3>
                <div id="jira-profiles-list" class="flex flex-wrap gap-2"></div>

                <button onclick="openAddProfileModal()" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium flex items-center gap-2">
                    <i class="fas fa-plus"></i>
                    Agregar nuevo perfil Jira
                </button>
            </div>
        </div>
    </div>

    <!-- Modal centrado -->
    <div id="profile-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" class="text-xl font-semibold mb-6">Nuevo perfil de Jira</h3>
            
            <input id="modal-name" type="text" placeholder="Nombre del perfil" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-white mb-4">
            <input id="modal-url" type="text" placeholder="https://tu-empresa.atlassian.net" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-white mb-4">
            <input id="modal-email" type="email" placeholder="tuemail@empresa.com" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-white mb-4">
            <input id="modal-token" type="password" placeholder="API Token" class="w-full bg-[#0d1117] border border-[#30363d] rounded-lg p-3 text-white mb-6">

            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-6 py-2 text-gray-400 hover:text-white">Cancelar</button>
                <button onclick="saveProfile()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg">Guardar Perfil</button>
            </div>
        </div>
    </div>

    <script>
        console.log("%c=== INDEX.HTML VERSIÓN ACTUALIZADA - 2026-04-15 15:00 ===", "color: lime; font-weight: bold; font-size: 14px");
        let sidebarCollapsed = false;
        let currentEditIndex = -1;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebarCollapsed = !sidebarCollapsed;
            sidebar.classList.toggle('collapsed', sidebarCollapsed);
            const icon = document.getElementById('toggle-icon');
            icon.classList.toggle('fa-chevron-left', !sidebarCollapsed);
            icon.classList.toggle('fa-chevron-right', sidebarCollapsed);
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');

            document.querySelectorAll('#tab-manual, #tab-jira, #tab-config').forEach(tabEl => tabEl.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }

        // ==================== MANUAL ====================
        async function generateManual() {
            const btn = document.getElementById('manual-btn');
            const text = document.getElementById('manual-text');
            const spinner = document.getElementById('manual-spinner');

            btn.disabled = true;
            text.classList.add('hidden');
            spinner.classList.remove('hidden');

            const desc = document.getElementById('manual-desc').value;
            const ctx = document.getElementById('manual-ctx').value;

            try {
                const res = await fetch('/generate/manual', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({descripcion: desc, contexto: ctx})
                });
                const data = await res.json();
                showResultManual(data);
            } catch (e) {
                alert("Error de conexión");
            } finally {
                btn.disabled = false;
                text.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        function downloadJsonManual() {
            if (!window.currentResultManual) {
                alert("Primero genera los casos de prueba en la pestaña Descripción Manual");
                return;
            }
            const data = window.currentResultManual;
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test-cases-${(data.feature || 'resultado').replace(/ /g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadTxtManual() {
            const el = document.getElementById('result-content-manual');
            if (!el || !el.innerText || el.innerText.trim() === '') {
                alert("Primero genera los casos de prueba en la pestaña Descripción Manual");
                return;
            }
            const content = el.innerText;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test-cases-${(window.currentResultManual?.feature || 'resultado').replace(/ /g, '-')}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==================== JIRA ====================
        async function generateJira() {
            const btn = document.getElementById('jira-btn');
            const text = document.getElementById('jira-text');
            const spinner = document.getElementById('jira-spinner');

            btn.disabled = true;
            text.classList.add('hidden');
            spinner.classList.remove('hidden');

            const profileIndex = document.getElementById('jira-profile').selectedIndex;
            const ticket = document.getElementById('jira-ticket').value;
            const ctx = document.getElementById('jira-ctx').value;

            try {
                const res = await fetch('/generate/jira', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ticket: ticket, contexto: ctx, profile_index: profileIndex})
                });
                const data = await res.json();
                showResultJira(data);
            } catch (e) {
                alert("Error de conexión");
            } finally {
                btn.disabled = false;
                text.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        function showResultJira(data) {
            if (data.error) {
                alert(data.error);
                return;
            }

            let text = data.feature + "\n\n";

            data.escenarios.forEach((esc, i) => {
                text += `Escenario ${i+1}: ${esc.titulo}\n\n`;
                text += `Precondiciones:\n`;
                text += esc.precondiciones.map(p => `* ${p}`).join('\n') + "\n\n";
                text += `Pasos (Gherkin):\n`;
                text += esc.steps.map(s => `* ${s}`).join('\n') + "\n\n";
            });

            document.getElementById('result-content-jira').innerText = text.trim();
            document.getElementById('result-jira').classList.remove('hidden');
            window.currentResultJira = data;
        }

        function downloadJsonJira() {
            if (!window.currentResultJira) {
                alert("Primero genera los casos de prueba en la pestaña Jira");
                return;
            }
            const data = window.currentResultJira;
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test-cases-${(data.feature || 'resultado').replace(/ /g, '-')}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function downloadTxtJira() {
            const el = document.getElementById('result-content-jira');
            if (!el || !el.innerText || el.innerText.trim() === '') {
                alert("Primero genera los casos de prueba en la pestaña Jira");
                return;
            }
            const content = el.innerText;
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test-cases-${(window.currentResultJira?.feature || 'resultado').replace(/ /g, '-')}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==================== CONFIGURACIÓN + MODAL ====================
        window.onload = async () => {
            const res = await fetch('/api/config');
            const data = await res.json();
            document.getElementById('config-model').value = data.model || "qwen2:7b";
            renderJiraProfiles(data.jira_profiles || []);
        };

        function renderJiraProfiles(profiles) {
            const container = document.getElementById('jira-profiles-list');
            container.innerHTML = '';
            if (profiles.length === 0) {
                container.innerHTML = '<p class="text-gray-400 italic">No hay perfiles configurados todavía.</p>';
                return;
            }
            profiles.forEach((p, index) => {
                container.innerHTML += `
                    <div class="inline-flex items-center gap-2 bg-[#21262d] text-white px-4 py-2 rounded-full text-sm">
                        <span>${p.name || 'Perfil ' + (index+1)}</span>
                        <button onclick="editProfile(${index})" class="text-blue-400 hover:text-blue-300"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProfile(${index})" class="text-red-400 hover:text-red-300"><i class="fas fa-trash"></i></button>
                    </div>`;
            });
            const select = document.getElementById('jira-profile');
            select.innerHTML = '';
            profiles.forEach((p, i) => {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = p.name || 'Perfil ' + (i+1);
                select.appendChild(option);
            });
        }

        function openAddProfileModal() {
            currentEditIndex = -1;
            document.getElementById('modal-title').textContent = "Nuevo perfil de Jira";
            document.getElementById('modal-name').value = "";
            document.getElementById('modal-url').value = "";
            document.getElementById('modal-email').value = "";
            document.getElementById('modal-token').value = "";
            document.getElementById('profile-modal').style.display = 'flex';
        }

        function editProfile(index) {
            currentEditIndex = index;
            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    const p = data.jira_profiles[index];
                    document.getElementById('modal-title').textContent = "Editar perfil de Jira";
                    document.getElementById('modal-name').value = p.name || "";
                    document.getElementById('modal-url').value = p.url || "";
                    document.getElementById('modal-email').value = p.email || "";
                    document.getElementById('modal-token').value = p.token || "";
                    document.getElementById('profile-modal').style.display = 'flex';
                });
        }

        function closeModal() {
            document.getElementById('profile-modal').style.display = 'none';
            currentEditIndex = -1;
        }

        function saveProfile() {
            const name = document.getElementById('modal-name').value.trim();
            const url = document.getElementById('modal-url').value.trim();
            const email = document.getElementById('modal-email').value.trim();
            const token = document.getElementById('modal-token').value.trim();

            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    data.jira_profiles = data.jira_profiles || [];
                    const profile = { name, url, email, token };

                    if (currentEditIndex >= 0) {
                        data.jira_profiles[currentEditIndex] = profile;
                    } else {
                        data.jira_profiles.push(profile);
                    }

                    return fetch('/api/config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                })
                .then(() => {
                    closeModal();
                    window.onload();
                });
        }

        function deleteProfile(index) {
            if (!confirm("¿Eliminar este perfil?")) return;
            fetch('/api/config')
                .then(r => r.json())
                .then(data => {
                    data.jira_profiles.splice(index, 1);
                    return fetch('/api/config', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                })
                .then(() => window.onload());
        }
    </script>
</body>
</html>
